server {
    listen 8099;
    server_name _;
    root /share/joan;
    index dashboard.html;

    # No caching - the e-ink kiosk should always get the latest file.
    add_header Cache-Control "no-store";

    # IP allow/deny list, generated from the allow_cidr add-on option.
    include /etc/nginx/joan_access.conf;

    # Static dashboard files.
    location / {
        try_files $uri $uri/ =404;
    }

    # Proxy the Home Assistant API and inject the token server-side, so the
    # token is never present in any file served to the browser. The token
    # include is generated at startup from the ha_token add-on option.
    location /api/ {
        include /etc/nginx/joan_token.conf;
        proxy_set_header Host $host;
        proxy_pass http://homeassistant:8123;
    }
}
